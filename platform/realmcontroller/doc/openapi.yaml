      scheme: bearer
      bearerFormat: JWT     
    # ApiKeyAuth:
    #   type: apiKey
    #   in: header
    #   name: Authorization
paths:
  /sessions:
    post:
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
        '400':
          description: Error creating session
    put:
      summary: Refresh an existing session's token
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Session refreshed successfully
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Error executing update
    delete:
      summary: Destroy a session
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Session destroyed successfully
        '400':
          description: Error executing delete
