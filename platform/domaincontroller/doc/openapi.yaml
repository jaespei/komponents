openapi: 3.0.0
info:
  title: Komponents Domain Controller API
  description: API documentation for the Komponents Domain Controller component
  version: 1.0.0
paths:
  /domains:
    get:
      summary: Retrieve a list of all domains
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Optional filter to apply to the domain list
        - in: query
          name: opts
          required: false
          schema:
            type: string
          description: Optional additional options for the query
      responses:
        '200':
          description: List of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          description: Error executing query
    post:
      summary: Create a new domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Domain created successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error creating domain
  /domains/{domId}:
    get:
      summary: Retrieve details of a specific domain
      parameters:
        - in: path
          name: domId
          required: true
          schema:
            type: string
          description: The ID of the domain to retrieve
      responses:
        '200':
          description: Domain details retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error retrieving domain
    put:
      summary: Update an existing domain's information
      parameters:
        - in: path
          name: domId
          required: true
          schema:
            type: string
          description: The ID of the domain to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Domain updated successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error executing update
    delete:
      summary: Delete a specific domain
      parameters:
        - in: path
          name: domId
          required: true
          schema:
            type: string
          description: The ID of the domain to delete
      responses:
        '200':
          description: Domain deleted successfully
        '400':
          description: Error executing delete
